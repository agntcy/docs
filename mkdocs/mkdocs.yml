site_name: Agntcy
site_url: https://docs.agntcy.org/

docs_dir: ../docs

repo_name: agntcy/docs
repo_url: https://github.com/agntcy/docs
edit_uri: edit/main/docs/

extra:
  agntcy:
    dir_url: https://dir.agntcy.org/latest/
    slim_url: https://slim.agntcy.org/latest/
    identity_url: https://spec.identity.agntcy.org/docs/intro
  copyright: "© 2026, Agntcy, a Series of LF Projects, LLC. All rights reserved."
  analytics:
    provider: google
    property: G-H5NVFB80VS
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject
extra_css:
  - stylesheets/custom.css
  - stylesheets/landing.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - hooks.py

plugins:
  search:
  redirects:
