  awesome-pages:
    filename: ".index"
    collapse_single_pages: true
    strict: false
  mkdocstrings:
    handlers:
      python:
        options:
          docstring_style: sphinx
          docstring_section_style: list
          extensions:
            - griffe_pydantic:
                schema: true
  swagger-ui-tag:
  include-markdown:
  macros:
    # Shared variable values (e.g. agntcy.dir_url) are defined under `extra:` above.
    # This section configures the Jinja tag delimiters only; use `[[ ... ]]` in markdown.
    # Avoid conflict with React/JSX-style {{ }} in markdown (e.g. identity_service_settings.md).
    j2_variable_start_string: "[["
    j2_variable_end_string: "]]"
    j2_block_start_string: "[[%"
    j2_block_end_string: "%]]"
    j2_comment_start_string: "[[#"
    j2_comment_end_string: "#]]"

theme:
  name: material
  custom_dir: overrides

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    # - navigation.sections
    # - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.ico
  logo_light: assets/img/logo-light.svg
  logo_dark: assets/img/logo-dark.svg
