name: Documentation

on:
  workflow_call:
    inputs:
      deploy:
        description: 'Deploy documentation artifacts'
        required: true
        type: boolean
        default: false
      version:
        description: 'Version to use for documentation artifacts'
        required: true
        type: string
        default: dev

  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy documentation artifacts'
        required: true
        type: boolean
        default: false
      version:
        description: 'Version to use for documentation artifacts'
        required: true
        type: string
        default: dev

permissions:
  contents: write

jobs:
  docs:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.1'

      - name: Setup Taskfile
        shell: bash
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Setup UV
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Update GITHUB_PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build docs
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          task build

      - name: Configure Git for mike
        if: ${{ inputs.deploy == true || inputs.deploy == 'true' }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Fetch gh-pages
        if: ${{ inputs.deploy == true || inputs.deploy == 'true' }}
        continue-on-error: true
        run: git fetch origin gh-pages --depth=1

      - name: Deploy versioned docs (mike)
        if: ${{ inputs.deploy == true || inputs.deploy == 'true' }}
        shell: bash
        working-directory: mkdocs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MIKE_VERSION="${VERSION#v}"
          uv run mike deploy --push --update-aliases "$MIKE_VERSION" latest
          uv run mike set-default --push latest
